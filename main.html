<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>
	<body>
	<form>
    <h2>Dog Adoption Form</h2>

    <!-- Name -->
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Name" required>

    <!-- Phone -->
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="Phone Number" required>

    <!-- Address -->
    <label for="address">Address</label>
    <input type="text" id="address" placeholder="Address" required>

    <!-- Checkbox -->
    <div class="checkbox-group">
        <input type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?">
        <label for="checkbox">Have you ever lived with a Dog before?</label>
    </div>

    <!-- Multi Select -->
    <label for="breeds">Please select your preferred breeds</label>
    <select id="breeds" multiple>
        <option>Golden Retriever</option>
        <option>Labrador</option>
        <option>German Shepherd</option>
        <option>Pug</option>
    </select>

    <!-- Submit -->
    <button type="submit">Submit</button>
</form>


	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
